<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baby Shower • Ximena 🍓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================
     CONFIGURACIÓN — Edita aquí tus datos
     ============================================ */
     /* BOTÓN CONFIRMAR ASISTENCIA */
.btn-rsvp {
  display: inline-block;
  margin: 40px auto;
  background: linear-gradient(135deg, #c8233a, #a91b2e);
  color: white;
  padding: 14px 32px;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(200, 35, 58, 0.35);
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  width: fit-content;
  text-decoration: none;
}

.btn-rsvp:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 15px 35px rgba(200, 35, 58, 0.5);
}

.btn-rsvp:active {
  transform: scale(0.95);
}
  :root {
    --pink-soft: #fde7ee;
    --pink: #f9c6d4;
    --pink-deep: #e88aa3;
    --red-strawberry: #c8233a;
    --red-deep: #a91b2e;
    --green-leaf: #6fa86a;
    --cream: #fff5f7;
    --shadow: rgba(200, 35, 58, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    overflow-x: hidden;
    background: #f4d3dc;
    font-family: 'Quicksand', sans-serif;
    color: var(--red-deep);
    min-height: 100vh;
  }

  /* Fondo cuadrille rosa */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(249, 198, 212, 0.6) 50%, transparent 50%),
      linear-gradient(90deg, rgba(249, 198, 212, 0.6) 50%, transparent 50%);
    background-size: 40px 40px;
    background-color: #fff;
    z-index: -2;
  }

  /* ============================================
     PANTALLA INICIAL — Sobre cerrado
     ============================================ */
  #cover {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 20px;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #cover.opened {
    opacity: 0;
    transform: scale(1.2);
    pointer-events: none;
  }

  .envelope {
    width: 260px;
    height: 180px;
    position: relative;
    cursor: pointer;
    filter: drop-shadow(0 20px 30px var(--shadow));
    animation: floaty 3s ease-in-out infinite;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #ffe0e9, #f9c6d4);
    border-radius: 8px;
    border: 2px solid #fff;
  }
  .envelope-flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform-origin: top;
    transition: transform 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045);
  }
  .envelope-flap::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    border-left: 130px solid transparent;
    border-right: 130px solid transparent;
    border-top: 100px solid #f9c6d4;
  }
  .envelope.open .envelope-flap {
    transform: rotateX(180deg);
  }
  .envelope-heart {
    position: absolute;
    top: 60%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    z-index: 2;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 32px;
    color: var(--red-strawberry);
    text-align: center;
    text-shadow: 0 2px 4px rgba(255,255,255,0.8);
  }
  .cover-sub {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
    color: var(--red-deep);
    margin-top: -10px;
  }
  .tap-hint {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--red-deep);
    opacity: 0.7;
    text-transform: uppercase;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Decoración flotante en cover */
  .floating-deco {
    position: absolute;
    font-size: 28px;
    opacity: 0.7;
    animation: drift 8s ease-in-out infinite;
  }
  .deco-1 { top: 15%; left: 10%; animation-delay: 0s; }
  .deco-2 { top: 20%; right: 12%; animation-delay: 1s; font-size: 22px; }
  .deco-3 { bottom: 20%; left: 15%; animation-delay: 2s; font-size: 24px; }
  .deco-4 { bottom: 25%; right: 10%; animation-delay: 3s; }
  .deco-5 { top: 50%; left: 5%; animation-delay: 1.5s; font-size: 20px; }
  .deco-6 { top: 55%; right: 6%; animation-delay: 2.5s; font-size: 26px; }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(10px, -15px) rotate(10deg); }
  }

  /* ============================================
     CONTENIDO PRINCIPAL
     ============================================ */
  main {
    opacity: 1;
    transition: opacity 1.2s ease 0.6s;
    padding: 20px 16px 100px;
    max-width: 500px;
    margin: 0 auto;
  }
  main.show { opacity: 1; }

  .invite-card {
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px var(--shadow), 0 0 0 1px rgba(255,255,255,0.5);
    animation: reveal 1s ease 0.8s both;
  }
  .invite-card img {
    width: 100%;
    display: block;
  }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ============================================
     SECCIÓN GALERÍA
     ============================================ */
  .section-title {
    font-family: 'Dancing Script', cursive;
    font-size: 38px;
    color: var(--red-strawberry);
    text-align: center;
    margin: 40px 0 8px;
  }
  .section-sub {
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--red-deep);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .gallery {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 10px 4px 20px;
    align-items: center;
  }

  .photo {
    width: 100%;
    max-width: 360px;
    aspect-ratio: 2 / 3;
    border-radius: 18px;
    background: var(--pink-soft);
    box-shadow: 0 10px 30px var(--shadow);
    position: relative;
    overflow: hidden;
    border: 6px solid #fff;
  }
  .photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .photo-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, #ffe7ee, #f9c6d4);
    color: var(--red-deep);
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    text-align: center;
    padding: 20px;
  }
  .photo-placeholder span { font-size: 50px; opacity: 0.6; }

  /* ============================================
     CUENTA REGRESIVA
     ============================================ */
  .countdown-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 28px 20px 24px;
    margin: 30px 0;
    text-align: center;
    box-shadow: 0 10px 30px var(--shadow);
    border: 2px solid rgba(255,255,255,0.8);
    position: relative;
    overflow: hidden;
  }
  .countdown-card::before {
    content: '🍓';
    position: absolute;
    top: -10px; left: -10px;
    font-size: 50px;
    opacity: 0.15;
    transform: rotate(-20deg);
  }
  .countdown-card::after {
    content: '🎀';
    position: absolute;
    bottom: -15px; right: -10px;
    font-size: 50px;
    opacity: 0.15;
    transform: rotate(20deg);
  }
  .event-date {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--red-deep);
    margin-bottom: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .event-day-num {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 700;
    color: var(--red-strawberry);
    line-height: 1;
    margin: 4px 0;
  }
  .event-time {
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    color: var(--red-deep);
    margin-bottom: 20px;
  }
  .countdown-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--red-deep);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cd-unit {
    background: linear-gradient(135deg, var(--pink-soft), #fff);
    border-radius: 12px;
    padding: 12px 4px;
    border: 1px solid rgba(232, 138, 163, 0.3);
  }
  .cd-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--red-strawberry);
    line-height: 1;
  }
  .cd-lbl {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--red-deep);
    opacity: 0.7;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .countdown-done {
    font-family: 'Dancing Script', cursive;
    font-size: 32px;
    color: var(--red-strawberry);
    padding: 20px 0;
  }

  /* ============================================
     SECCIÓN UBICACIÓN
     ============================================ */
  .location-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 24px 20px;
    margin: 30px 0;
    text-align: center;
    box-shadow: 0 10px 30px var(--shadow);
    border: 2px solid rgba(255,255,255,0.8);
  }
  .location-card p {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
    color: var(--red-deep);
  }
  .btn {
    display: inline-block;
    background: var(--red-strawberry);
    color: white;
    padding: 14px 28px;
    border-radius: 50px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(200,35,58,0.3);
    transition: transform 0.2s;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.96); }
  .btn + .btn { margin-left: 8px; }

  /* ============================================
     CONTROL DE MÚSICA
     ============================================ */
  #music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--red-strawberry);
    color: white;
    border: none;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(200,35,58,0.4);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    animation: spin-pulse 4s linear infinite;
  }
  #music-btn.show { display: flex; }
  #music-btn.paused { animation-play-state: paused; opacity: 0.7; }
  @keyframes spin-pulse {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #yt-player {
    position: absolute;
    left: -9999px;
    width: 1px; height: 1px;
  }

  /* Cierre con corazón */
  .footer-heart {
    text-align: center;
    margin-top: 40px;
    font-family: 'Dancing Script', cursive;
    font-size: 24px;
    color: var(--red-strawberry);
  }
  .footer-heart .big { font-size: 32px; }

  /* ============================================
     CARRUSEL DE FOTOS
     ============================================ */
  .carousel-wrapper {
    position: relative;
    width: 100%;
    max-width: 360px;
    margin: 0 auto 10px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 30px var(--shadow);
    border: 6px solid #fff;
    aspect-ratio: 2 / 3;
    background: var(--pink-soft);
  }
  .carousel-track {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .carousel-track {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
  }
  .carousel-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 0.75s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }
  .carousel-slide.active {
    opacity: 1;
    transform: scale(1);
  }
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(200, 35, 58, 0.75);
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 22px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
  }
  .carousel-btn:hover { background: rgba(200,35,58,0.95); }
  .carousel-prev { left: 10px; }
  .carousel-next { right: 10px; }
  .carousel-dots {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 7px;
    z-index: 10;
  }
  .carousel-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .carousel-dot.active {
    background: white;
    transform: scale(1.2);
  }
  .carousel-slide img,
.carousel-slide video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

  /* ============================================
     MESA DE REGALOS LIVERPOOL
     ============================================ */
  .liverpool-section {
    background: linear-gradient(135deg, #fff5f7, #fde7ee);
    border-radius: 24px;
    padding: 32px 24px;
    margin: 30px 0;
    text-align: center;
    border: 2px solid rgba(200, 35, 58, 0.15);
    box-shadow: 0 8px 24px rgba(200, 35, 58, 0.12);
  }
  .liverpool-icon {
    font-size: 42px;
    margin-bottom: 10px;
  }
  .liverpool-title {
    font-family: 'Dancing Script', cursive;
    font-size: 2rem;
    color: var(--red-strawberry);
    margin: 0 0 10px;
  }
  .liverpool-sub {
    font-size: 0.95rem;
    color: var(--red-deep);
    margin: 0 0 20px;
    line-height: 1.6;
  }
  .liverpool-btn {
    display: inline-block;
    background: linear-gradient(135deg, #c8233a, #a91b2e);
    color: white;
    padding: 14px 32px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.5px;
    box-shadow: 0 8px 24px rgba(200, 35, 58, 0.35);
    transition: all 0.3s ease;
  }
  .liverpool-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(200, 35, 58, 0.5);
  }

</style>
</head>

  // CUENTA REGRESIVA — Fecha del evento
  // Formato: año, mes (0-11, junio=5), día, hora, minuto
  // ============================================
  const EVENT_DATE = new Date(2026, 5, 28, 15, 0, 0); // 28 junio 2026, 3:00 PM

  function updateCountdown() {
    const now = new Date();
    const diff = EVENT_DATE - now;

    if (diff <= 0) {
      document.getElementById('countdown').innerHTML =
        '<div class="countdown-done" style="grid-column: 1 / -1;">¡Hoy es el día! 💗🍓</div>';
      return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById('cd-d').textContent = String(d).padStart(2, '0');
    document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
    document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
    document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

// Confirmar Asistencia por WhatsApp
function confirmarAsistencia() {
  const nombre = prompt("¿Cómo te llamas? 💕");

  if (nombre && nombre.trim() !== "") {
    const mensaje = `Hola! Soy ${nombre.trim()} y confirmo mi asistencia al Baby Shower de Ximena 🍓`;
    const numero = "528117434391";   // ←←← CAMBIA ESTE NÚMERO
    
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
  } else {
    alert("Por favor ingresa tu nombre para confirmar 💗");
  }
}


  // ============================================
  // CARRUSEL DE FOTOS
  // ============================================
  let currentSlide = 0;
  const slides = document.querySelectorAll('.carousel-slide');
  const dots = document.querySelectorAll('.carousel-dot');

  function showSlide(n) {
    slides.forEach(s => s.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    currentSlide = (n + slides.length) % slides.length;
    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');
  }

  function moveCarousel(dir) {
    showSlide(currentSlide + dir);
  }

  function goToSlide(n) {
    showSlide(n);
  }

  // Auto-advance every 4 seconds
  setInterval(() => moveCarousel(1), 30000);

</script>

</body>
