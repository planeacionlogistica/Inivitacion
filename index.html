<style>

     /* BOTÓN CONFIRMAR ASISTENCIA */
.btn-rsvp {
  display: inline-block;
  margin: 40px auto;
  background: linear-gradient(135deg, #c8233a, #a91b2e);
  color: white;
  padding: 14px 32px;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(200, 35, 58, 0.35);
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  width: fit-content;
  text-decoration: none;
}

.btn-rsvp:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 15px 35px rgba(200, 35, 58, 0.5);
}

.btn-rsvp:active {
  transform: scale(0.95);
}
  :root {
    --pink-soft: #fde7ee;
    --pink: #f9c6d4;
    --pink-deep: #e88aa3;
    --red-strawberry: #c8233a;
    --red-deep: #a91b2e;
    --green-leaf: #6fa86a;
    --cream: #fff5f7;
    --shadow: rgba(200, 35, 58, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    overflow-x: hidden;
    background: #f4d3dc;
    font-family: 'Quicksand', sans-serif;
    color: var(--red-deep);
    min-height: 100vh;
  }

  /* Fondo cuadrille rosa */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(249, 198, 212, 0.6) 50%, transparent 50%),
      linear-gradient(90deg, rgba(249, 198, 212, 0.6) 50%, transparent 50%);
    background-size: 40px 40px;
    background-color: #fff;
    z-index: -2;
  }

  /* ============================================
     PANTALLA INICIAL — Sobre cerrado
     ============================================ */
  #cover {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 20px;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #cover.opened {
    opacity: 0;
    transform: scale(1.2);
    pointer-events: none;
  }

  .envelope {
    width: 260px;
    height: 180px;
    position: relative;
    cursor: pointer;
    filter: drop-shadow(0 20px 30px var(--shadow));
    animation: floaty 3s ease-in-out infinite;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #ffe0e9, #f9c6d4);
    border-radius: 8px;
    border: 2px solid #fff;
  }
  .envelope-flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform-origin: top;
    transition: transform 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045);
  }
  .envelope-flap::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    border-left: 130px solid transparent;
    border-right: 130px solid transparent;
    border-top: 100px solid #f9c6d4;
  }
  .envelope.open .envelope-flap {
    transform: rotateX(180deg);
  }
  .envelope-heart {
    position: absolute;
    top: 60%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    z-index: 2;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 32px;
    color: var(--red-strawberry);
    text-align: center;
    text-shadow: 0 2px 4px rgba(255,255,255,0.8);
  }
  .cover-sub {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
    color: var(--red-deep);
    margin-top: -10px;
  }
  .tap-hint {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--red-deep);
    opacity: 0.7;
    text-transform: uppercase;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Decoración flotante en cover */
  .floating-deco {
    position: absolute;
    font-size: 28px;
    opacity: 0.7;
    animation: drift 8s ease-in-out infinite;
  }
  .deco-1 { top: 15%; left: 10%; animation-delay: 0s; }
  .deco-2 { top: 20%; right: 12%; animation-delay: 1s; font-size: 22px; }
  .deco-3 { bottom: 20%; left: 15%; animation-delay: 2s; font-size: 24px; }
  .deco-4 { bottom: 25%; right: 10%; animation-delay: 3s; }
  .deco-5 { top: 50%; left: 5%; animation-delay: 1.5s; font-size: 20px; }
  .deco-6 { top: 55%; right: 6%; animation-delay: 2.5s; font-size: 26px; }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(10px, -15px) rotate(10deg); }
  }

  /* ============================================
     CONTENIDO PRINCIPAL
     ============================================ */

  }

}

<script>
  
// ============================================
// MÚSICA
// ============================================
let isPlaying = false;
const song = document.getElementById('song');

function startMusic() {

    song.volume = 0.7;

    song.play()
        .then(() => {
            isPlaying = true;
        })
        .catch(() => {});
}

document.addEventListener('click', startMusic, { once: true });
document.addEventListener('touchstart', startMusic, { once: true });

function toggleMusic() {
    if (isPlaying) {
        song.pause();
        isPlaying = false;
        document.getElementById('music-btn').classList.add('paused');
    } else {
        song.play();
        isPlaying = true;
        document.getElementById('music-btn').classList.remove('paused');
    }
}

  // ============================================
  // CUENTA REGRESIVA — Fecha del evento
  // Formato: año, mes (0-11, junio=5), día, hora, minuto
  // ============================================
  const EVENT_DATE = new Date(2026, 5, 28, 15, 0, 0); // 28 junio 2026, 3:00 PM

  function updateCountdown() {
    const now = new Date();
    const diff = EVENT_DATE - now;

    if (diff <= 0) {
      document.getElementById('countdown').innerHTML =
        '<div class="countdown-done" style="grid-column: 1 / -1;">¡Hoy es el día! 💗🍓</div>';
      return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById('cd-d').textContent = String(d).padStart(2, '0');
    document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
    document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
    document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

// Confirmar Asistencia por WhatsApp
function confirmarAsistencia() {
  const nombre = prompt("¿Cómo te llamas? 💕");

  if (nombre && nombre.trim() !== "") {
    const mensaje = `Hola! Soy ${nombre.trim()} y confirmo mi asistencia al Baby Shower de Ximena 🍓`;
    const numero = "528117434391";   // ←←← CAMBIA ESTE NÚMERO
    
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
  } else {
    alert("Por favor ingresa tu nombre para confirmar 💗");
  }
}


  // ============================================
  // CARRUSEL DE FOTOS
  // ============================================
  let currentSlide = 0;
  const slides = document.querySelectorAll('.carousel-slide');
  const dots = document.querySelectorAll('.carousel-dot');

  function showSlide(n) {
    slides.forEach(s => s.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    currentSlide = (n + slides.length) % slides.length;
    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');
  }

  function moveCarousel(dir) {
    showSlide(currentSlide + dir);
  }

  function goToSlide(n) {
    showSlide(n);
  }

  // Auto-advance every 4 seconds
  setInterval(() => moveCarousel(1), 20000);

</script>
